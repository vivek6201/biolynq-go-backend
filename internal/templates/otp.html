<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Biobiolynq Verification Code</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f9fafb;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }
        .wrapper {
            width: 100%;
            table-layout: fixed;
            background-color: #f9fafb;
            padding: 40px 0;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 16px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            padding: 32px;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            color: #111827;
            text-align: center;
            margin-bottom: 24px;
            letter-spacing: -0.05em;
        }
        .logo span {
            color: #6366f1; /* Modern Indigo accent */
        }
        .heading {
            font-size: 20px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 12px;
            text-align: center;
        }
        .text {
            font-size: 15px;
            color: #4b5563;
            line-height: 24px;
            text-align: center;
            margin-bottom: 28px;
        }
        .otp-container {
            background-color: #f3f4f6;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            margin-bottom: 28px;
        }
        .otp-code {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 6px;
            color: #111827;
            margin: 0;
        }
        .footer {
            font-size: 12px;
            color: #9ca3af;
            text-align: center;
            line-height: 18px;
            border-top: 1px solid #f3f4f6;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="logo">bio<span>lynq</span></div>
            
            <div class="heading">Verify your email</div>
            <div class="text">
                Use the verification code below to sign in to your Biobiolynq account. This code will expire in 10 minutes.
            </div>
            
            <div class="otp-container">
                <p class="otp-code">{{.OTP}}</p>
            </div>
            
            <div class="text" style="font-size: 13px; color: #9ca3af; margin-bottom: 0;">
                If you didn't request this code, you can safely ignore this email.
            </div>
            
            <div class="footer">
                &copy; 2026 Biobiolynq. All rights reserved.<br>
                Your ultimate link in bio platform.
            </div>
        </div>
    </div>
</body>
</html>
