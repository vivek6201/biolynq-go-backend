name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

jobs:
  check-commit:
    name: Check Commit (Build & Compile)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Build Go Code
        run: go build -v ./...

      - name: Run Go Tests
        run: go test -v ./...

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Docker Server Build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.server
          target: prod
          platforms: linux/amd64
          push: false

      - name: Verify Docker Worker Build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.worker
          target: prod
          platforms: linux/amd64
          push: false

  build-and-push:
    name: Build & Push to Docker Hub & Deploy
    needs: check-commit
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Run Build and Push Script
        env:
          CI: true
        run: |
          chmod +x scripts/build-and-push.sh
          ./scripts/build-and-push.sh "${{ secrets.DOCKER_HUB_USERNAME }}" "latest"

      - name: Deploy to Remote Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            DOCKER_USER="${{ secrets.DOCKER_HUB_USERNAME }}" TAG="latest" docker compose -f docker-compose.prod.yml pull
            DOCKER_USER="${{ secrets.DOCKER_HUB_USERNAME }}" TAG="latest" docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans
